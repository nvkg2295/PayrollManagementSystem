<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Payroll Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            background-color: #f5f5f5;
        }

        .card {
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

    <header class="container mt-4">
        <h1 class="text-center mb-4">
            Payroll Management System
        </h1>
    </header>

    <main class="container">

        <!-- Employee Section -->
        <section class="card mb-4">

            <header class="card-header bg-primary text-white">
                Employee Master
            </header>

            <div class="card-body">

                <button id="employeeBtn" class="btn btn-info mb-3" onclick="loadEmployees()">
                    Get Employee List
                </button>

                <div id="employeeTableContainer" style="display:none;">
                    <table class="table table-bordered table-striped">

                    <thead>
                        <tr>
                            <th>Employee Id</th>
                            <th>Employee Name</th>
                            <th>Department</th>
                            <th>Basic Salary</th>
                        </tr>
                    </thead>

                        <tbody id="employeesBody"></tbody>
                    </table>
                </div>

            </div>
        </section>

        <!-- Payroll Section -->
        <section class="card mb-4">

            <header class="card-header bg-success text-white">
                Run Payroll
            </header>

            <div class="card-body">

                <div class="row">

                    <div class="col-md-3">
                        <label class="form-label">Month &amp; Year</label>
                        <input type="month" id="payrollMonth" class="form-control" />
                    </div>

                    <div class="col-md-9 d-flex align-items-end">
                        <button class="btn btn-success me-2" onclick="runPayroll()">
                            Run Payroll
                        </button>

                        <button class="btn btn-secondary" onclick="loadPayrollFromInputs()">
                            Load Payroll
                        </button>
                    </div>

                </div>

            </div>
        </section>

        <!-- Payroll Results Section -->
        <section class="card">

            <header class="card-header bg-dark text-white">
                Payroll Results
            </header>

            <div class="card-body">

                <div id="payrollResultsContainer" style="display:none;">
                    <table class="table table-bordered table-hover">

                        <thead>
                            <tr>
                                <th>Employee Id</th>
                                <th>Employee Name</th>
                                <th>Basic Salary</th>
                                <th>WorkingDays</th>
                                <th>Days Present</th>
                                <th>Gross Pay</th>
                                <th>PF Deduction</th>
                                <th>Professional Tax</th>
                                <th>Net Pay</th>
                                <th>Payslip</th>
                            </tr>
                        </thead>

                        <tbody id="payrollBody"></tbody>

                    </table>
                </div>

            </div>

        </section>

    </main>

    <script src="js/app.js"></script>

</body>
</html>
